<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Krisna - Landing Page</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:#0f0f0f;
  color:#fff;
  overflow-x:hidden;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  text-align:center;
  background:linear-gradient(135deg,#1a1a1a,#0f0f0f);
}

.profile{
  width:160px;
  height:160px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #ff7a00;
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
  100%{transform:translateY(0)}
}

.hero h1{
  margin-top:20px;
  font-size:40px;
  font-weight:700;
}

.hero h1 span{
  color:#ff7a00;
}

.typing{
  margin-top:10px;
  font-size:18px;
  color:#aaa;
}

/* SECTION */
.section{
  padding:80px 10%;
}

.section h2{
  color:#ff7a00;
  margin-bottom:30px;
}

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 10px 30px rgba(255,122,0,0.2);
}

.skills{
  display:flex;
  gap:20px;
}

.skills div{
  flex:1;
}

/* ANIMATION */
.fade{
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

@media(max-width:768px){
  .skills{flex-direction:column}
  .hero h1{font-size:28px}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <img src="fotokrisna.jpg" class="profile">
  <h1>Hi, I'm <span>Krisna</span></h1>
  <div class="typing" id="typing"></div>
</section>

<!-- PENGALAMAN -->
<section class="section fade">
  <h2>Pengalaman</h2>
  <div class="card">
    <h3>Operator Produksi</h3>
    <p>PT Laksana Karoseri (2022)</p>
  </div>
  <div class="card">
    <h3>Admin & Owner</h3>
    <p>Bisnis Game Online</p>
  </div>
</section>

<!-- PENDIDIKAN -->
<section class="section fade">
  <h2>Pendidikan</h2>
  <div class="card">
    <h3>S1 Informatika</h3>
    <p>UIN SSC</p>
  </div>
</section>

<!-- SKILLS -->
<section class="section fade">
  <h2>Skills</h2>
  <div class="skills">
    <div class="card">
      <h4>Teknis</h4>
      <p>Python, Java, Excel</p>
    </div>
    <div class="card">
      <h4>Soft Skill</h4>
      <p>Komunikasi, Problem Solving</p>
    </div>
  </div>
</section>

<script>
// typing effect
const text = ["Web Developer","Mahasiswa Informatika","Tech Enthusiast"];
let i=0, j=0, current="", isDeleting=false;

function type(){
  current = text[i];
  document.getElementById("typing").textContent = current.substring(0,j);

  if(!isDeleting && j<current.length){
    j++;
    setTimeout(type,80);
  }else if(isDeleting && j>0){
    j--;
    setTimeout(type,40);
  }else{
    isDeleting = !isDeleting;
    if(!isDeleting) i=(i+1)%text.length;
    setTimeout(type,800);
  }
}

// scroll animation
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  })
})

document.querySelectorAll('.fade').forEach(el=>observer.observe(el));

type();
</script>

</body>
</html>
